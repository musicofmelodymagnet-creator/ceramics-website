<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 36px 36px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: start; }
  h4 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin: 0 0 14px; font-weight: 400; }
  .stack { display: grid; gap: 14px; }
  .btn { display: inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 26px; border: 0.5px solid transparent; cursor: pointer; transition: 200ms; text-align: center; }
  .p { background: var(--wax-seal); color: var(--bone-white); border-color: var(--wax-seal); }
  .p.h { background: #5E2320; border-color: #5E2320; }
  .s { background: transparent; color: var(--bark-black); border-color: var(--bark-black); }
  .s.h { background: var(--bark-black); color: var(--bone-white); }
  .g { background: transparent; color: var(--bark-black); border-color: transparent; padding: 4px 0; }
  .g::after { content: "  →"; }
  .g.h { color: var(--wax-seal); }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
</style></head>
<body>
<div class="grid">
  <div>
    <h4>Primary</h4>
    <div class="stack">
      <div><div class="lbl">default</div><a class="btn p">Bring it home</a></div>
      <div><div class="lbl">hover</div><a class="btn p h">Bring it home</a></div>
    </div>
  </div>
  <div>
    <h4>Secondary</h4>
    <div class="stack">
      <div><div class="lbl">default</div><a class="btn s">View the work</a></div>
      <div><div class="lbl">hover</div><a class="btn s h">View the work</a></div>
    </div>
  </div>
  <div>
    <h4>Ghost</h4>
    <div class="stack">
      <div><div class="lbl">default</div><a class="btn g">Read the story</a></div>
      <div><div class="lbl">hover</div><a class="btn g h">Read the story</a></div>
    </div>
  </div>
</div>
</body></html>
