<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 32px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  input { background: transparent; border: 0; border-bottom: 0.5px solid var(--bark-black); padding: 10px 0; font-family: var(--font-sans); font-size: 16px; color: var(--bark-black); outline: none; width: 100%; }
  input::placeholder { color: #8A7A65; font-style: italic; }
  .focused input { border-bottom-color: var(--wax-seal); }
  .focused-mark { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; color: var(--wax-seal); text-transform: uppercase; margin-top: 6px; }
</style></head>
<body>
<div class="field">
  <label>Your name</label>
  <input type="text" placeholder="anonymous">
</div>
<div class="field focused">
  <label>Email</label>
  <input type="email" value="hello@orlinsky.studio">
  <div class="focused-mark">focus · wax seal underline</div>
</div>
</body></html>
