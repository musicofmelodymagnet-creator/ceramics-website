<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 36px 40px; display: grid; grid-template-columns: 280px 1fr; gap: 36px; align-items: center; }
  .img { aspect-ratio: 4/5; background: var(--aged-clay);
    background-image:
      radial-gradient(ellipse at 30% 30%, rgba(245,241,232,0.4), transparent 50%),
      repeating-linear-gradient(135deg, rgba(42,37,32,0.05) 0 1px, transparent 1px 9px);
    display: flex; align-items: flex-end; justify-content: flex-start; padding: 14px;
  }
  .img .stamp { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  .meta { display: grid; gap: 8px; }
  .name { font-family: var(--font-serif); font-weight: 400; font-size: 28px; line-height: 1.1; color: var(--bark-black); margin: 0; }
  .cap-row { display: flex; gap: 14px; margin-top: 10px; }
  .cap { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  .price { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); margin-top: 16px; }
  .rule { width: 24px; height: 0.5px; background: var(--aged-clay); margin: 10px 0; }
</style></head>
<body>
<div class="img"><span class="stamp">work № 014</span></div>
<div class="meta">
  <span class="cap" style="color: var(--bark-black)">№ 014</span>
  <h3 class="name">A morning in May</h3>
  <span class="rule"></span>
  <div class="cap-row">
    <span class="cap">2025</span><span class="cap">pressed oak</span><span class="cap">1 / 1</span>
  </div>
  <span class="price">$ 2,400 USD</span>
</div>
</body></html>
