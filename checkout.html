<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Checkout — ORLINSKY Ceramic Studio</title>
<link rel="canonical" href="https://orlinskyceramic.ca/checkout.html">
<style>
@font-face{font-family:'Cormorant Garamond';src:url('Design%20from%20Claude%20Design/project/fonts/CormorantGaramond-Light.ttf')format('truetype');font-weight:300;font-style:normal;font-display:swap;}
@font-face{font-family:'Inter';src:url('Design%20from%20Claude%20Design/project/fonts/Inter_18pt-Regular.ttf')format('truetype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('Design%20from%20Claude%20Design/project/fonts/JetBrainsMono-Regular.ttf')format('truetype');font-weight:400;font-style:normal;font-display:swap;}

:root{
  --color-bg-base:#221E1A;
  --color-bg-header:#16130F;
  --color-bg-elevated:#2C2724;
  --color-text-primary:#F5F1E8;
  --color-text-secondary:#C9B89A;
  --color-text-muted:#7A6E63;
  --color-accent:#C8701F;
  --color-border:#2E2820;
  --font-serif:'Cormorant Garamond','EB Garamond',Georgia,serif;
  --font-sans:'Inter',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','IBM Plex Mono',monospace;
}

html,body{margin:0;padding:0;background:var(--color-bg-base);color:var(--color-text-primary);font-family:var(--font-sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.co-wrap{max-width:560px;margin:0 auto;padding:80px 24px 120px;}
.co-eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.44em;text-transform:uppercase;color:var(--color-accent);margin:0 0 16px;display:block;}
.co-title{font-family:var(--font-serif);font-weight:300;font-size:clamp(28px,3vw,44px);line-height:1.15;color:var(--color-text-primary);margin:0 0 48px;}

/* order summary */
.co-summary{background:var(--color-bg-elevated);border:1px solid var(--color-border);padding:24px;margin-bottom:36px;}
.co-summary-title{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--color-text-muted);margin:0 0 16px;}
.co-item{display:flex;justify-content:space-between;font-size:14px;color:var(--color-text-secondary);padding:6px 0;border-bottom:1px solid var(--color-border);}
.co-item:last-of-type{border-bottom:none;}
.co-total{display:flex;justify-content:space-between;font-family:var(--font-serif);font-size:20px;color:var(--color-text-primary);margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border);}

/* currency toggle */
.co-currency{display:flex;gap:8px;margin-bottom:32px;}
.co-cur-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:8px 20px;border:1px solid var(--color-border);background:transparent;color:var(--color-text-muted);cursor:pointer;transition:all 180ms ease;}
.co-cur-btn.active{border-color:var(--color-accent);color:var(--color-accent);}

/* stripe element */
#payment-element{margin-bottom:24px;}
#pay-btn{width:100%;background:var(--color-accent);border:none;padding:16px 40px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--color-text-primary);cursor:pointer;transition:background 200ms ease;display:flex;align-items:center;justify-content:center;gap:12px;}
#pay-btn:hover:not(:disabled){background:#d4823a;}
#pay-btn:disabled{opacity:0.55;cursor:default;}
#pay-error{font-size:13px;color:#f87171;margin-top:12px;min-height:20px;}

.trust{display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:24px;border-top:1px solid var(--color-border);}
.trust span{font-family:var(--font-sans);font-size:12px;color:var(--color-text-muted);line-height:1.4;}
.trust svg{flex-shrink:0;opacity:0.5;}
</style>
</head>
<body>

<div class="co-wrap">
  <span class="co-eyebrow">Secure Checkout</span>
  <h1 class="co-title">Complete<br>your order</h1>

  <!-- Order summary (populated by JS from cart state) -->
  <div class="co-summary">
    <div class="co-summary-title">Order Summary</div>
    <div id="co-items">
      <!-- JS вставит строки по catalog -->
    </div>
    <div class="co-total">
      <span>Total</span>
      <span id="co-total-amount">—</span>
    </div>
  </div>

  <!-- Currency toggle -->
  <div class="co-currency">
    <button class="co-cur-btn active" data-cur="cad">CAD $</button>
    <button class="co-cur-btn" data-cur="usd">USD $</button>
  </div>

  <!-- Stripe Payment Element -->
  <div id="payment-element"></div>

  <button id="pay-btn" disabled>
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    Pay now
  </button>
  <p id="pay-error" role="alert"></p>

  <div class="trust">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span>Payment encrypted and secured by Stripe. Card details are never stored on our servers.</span>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
// ─────────────────────────────────────────────
// ЗАПОЛНИ: вставь свой publishable key
// ─────────────────────────────────────────────
const STRIPE_PK = 'pk_test_51TqFGFRLE3GENWdWD5kDvXMFTjW3Tt3HjZFemtaG6YpcvbVM3hOmfbxXEWa3WZr5p88p8NixeXwZs1BQ8SjaCbQ300UWkSb8sq';

// ─────────────────────────────────────────────
// ЗАПОЛНИ: items из корзины (id должны совпадать с catalog.php)
// В реальной реализации берётся из localStorage / состояния страницы галереи
// ─────────────────────────────────────────────
const CART_ITEMS = ['painting-001']; // пример

// Клиентский каталог — только для отображения, цена считается на сервере
const CLIENT_CATALOG = {
  'painting-001': { title: 'Работа 1', cad: 45000, usd: 33000 },
  'painting-002': { title: 'Работа 2', cad: 62000, usd: 45000 },
};

// appearance под ORLINSKY dark palette
const appearance = {
  theme: 'night',
  variables: {
    colorPrimary:    '#C8701F',
    colorBackground: '#221E1A',
    colorText:       '#F5F1E8',
    colorTextPlaceholder: '#7A6E63',
    colorIconTab:    '#C9B89A',
    fontFamily:      '"Inter", -apple-system, sans-serif',
    fontSizeBase:    '14px',
    borderRadius:    '0px',
    spacingUnit:     '4px',
  },
  rules: {
    '.Input': { border: '1px solid #2E2820', backgroundColor: '#16130F', color: '#F5F1E8' },
    '.Input:focus': { borderColor: '#C8701F' },
    '.Label': { fontFamily: '"JetBrains Mono", monospace', fontSize: '9px', letterSpacing: '0.3em', textTransform: 'uppercase', color: '#7A6E63' },
  },
};

const stripe = Stripe(STRIPE_PK);
let elements;
let currentCurrency = 'cad';

// ── Рендер order summary ──────────────────────
function renderSummary(currency) {
  const container = document.getElementById('co-items');
  const totalEl   = document.getElementById('co-total-amount');
  container.innerHTML = '';
  let total = 0;
  CART_ITEMS.forEach(id => {
    const item = CLIENT_CATALOG[id];
    if (!item) return;
    const price = item[currency];
    total += price;
    const row = document.createElement('div');
    row.className = 'co-item';
    row.innerHTML = `<span>${item.title}</span><span>${formatMoney(price, currency)}</span>`;
    container.appendChild(row);
  });
  totalEl.textContent = formatMoney(total, currency);
}

function formatMoney(cents, currency) {
  return new Intl.NumberFormat('en-CA', { style: 'currency', currency: currency.toUpperCase() }).format(cents / 100);
}

// ── Currency toggle ───────────────────────────
document.querySelectorAll('.co-cur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.co-cur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCurrency = btn.dataset.cur;
    renderSummary(currentCurrency);
    initPayment(); // пересоздаём PaymentIntent с новой валютой
  });
});

// ── Init Stripe Elements ──────────────────────
async function initPayment() {
  document.getElementById('pay-btn').disabled = true;
  document.getElementById('pay-error').textContent = '';

  // TODO: собери shipping из формы на странице
  const order = {
    items:    CART_ITEMS,
    currency: currentCurrency,
    email:    '',          // подставь email покупателя
    shipping: {
      name:        '',     // подставь данные из формы
      line1:       '',
      city:        '',
      state:       '',
      postal_code: '',
      country:     'CA',
    },
  };

  const res  = await fetch('/api/create-payment-intent.php', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(order),
  });
  const data = await res.json();
  if (data.error) { showError(data.error); return; }

  if (elements) elements.destroy();
  elements = stripe.elements({ clientSecret: data.clientSecret, appearance });
  elements.create('payment').mount('#payment-element');
  document.getElementById('pay-btn').disabled = false;
}

// ── Confirm payment ───────────────────────────
document.getElementById('pay-btn').addEventListener('click', async () => {
  const btn = document.getElementById('pay-btn');
  btn.disabled = true;
  const { error } = await stripe.confirmPayment({
    elements,
    confirmParams: { return_url: 'https://orlinskyceramic.ca/order-success.html' },
  });
  if (error) {
    showError(error.message);
    btn.disabled = false;
  }
  // при успехе Stripe сам делает редирект на return_url
});

function showError(msg) {
  document.getElementById('pay-error').textContent = msg;
}

// ── Boot ──────────────────────────────────────
renderSummary(currentCurrency);
initPayment();
</script>
</body>
</html>
