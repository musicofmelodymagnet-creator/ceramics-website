<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { background: var(--bone-white); padding: 32px 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  h4 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin: 0 0 18px; font-weight: 400; }
  .row { display: flex; gap: 28px; align-items: center; }
  .row svg { width: 18px; height: 18px; stroke-width: 1; color: var(--bark-black); }
  .strike { position: relative; display: inline-flex; gap: 14px; align-items: center; }
  .strike::before { content:""; position: absolute; left:-6%; right:-6%; top:50%; height: 0.5px; background: var(--wax-seal); transform: rotate(-6deg); }
  .never { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); }
  .emoji { font-size: 22px; line-height: 1; }
  .note { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--smoked-oak); margin-top: 12px; }
</style></head>
<body>
<div>
  <h4>Use — Lucide · 1px stroke</h4>
  <div class="row">
    <i data-lucide="search"></i>
    <i data-lucide="shopping-bag"></i>
    <i data-lucide="user"></i>
    <i data-lucide="map-pin"></i>
    <i data-lucide="mail"></i>
  </div>
  <div class="note">18 px · currentColor · stroke 1</div>
</div>
<div>
  <h4>Never</h4>
  <div class="strike"><span class="emoji">✨</span><span class="emoji">🏺</span><span class="emoji">🌿</span><span class="never">no emoji</span></div>
  <div class="note" style="margin-top:20px">no filled icons · no flat illustrations · no mascots</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
