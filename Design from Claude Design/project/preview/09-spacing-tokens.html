<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 36px; }
  .row { display: grid; grid-template-columns: 70px 1fr 100px; column-gap: 18px; align-items: center; padding: 10px 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); }
  .bar { height: 14px; background: var(--aged-clay); }
  .val { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--smoked-oak); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="tag">s-3</span><div class="bar" style="width:16px"></div><span class="val">16 px</span></div>
  <div class="row"><span class="tag">s-4</span><div class="bar" style="width:24px"></div><span class="val">24 px</span></div>
  <div class="row"><span class="tag">s-5</span><div class="bar" style="width:32px"></div><span class="val">32 px</span></div>
  <div class="row"><span class="tag">s-6</span><div class="bar" style="width:48px"></div><span class="val">48 px</span></div>
  <div class="row"><span class="tag">s-7</span><div class="bar" style="width:64px"></div><span class="val">64 px</span></div>
  <div class="row"><span class="tag">s-8</span><div class="bar" style="width:80px"></div><span class="val">80 px · section</span></div>
  <div class="row"><span class="tag">s-9</span><div class="bar" style="width:120px"></div><span class="val">120 px · generous</span></div>
  <div class="row"><span class="tag">s-10</span><div class="bar" style="width:160px"></div><span class="val">160 px · hero</span></div>
</body></html>
