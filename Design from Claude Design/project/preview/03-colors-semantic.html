<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 32px 40px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 64px; row-gap: 14px; }
  .row { display: grid; grid-template-columns: 14px 1fr auto; gap: 14px; align-items: center; }
  .dot { width: 14px; height: 14px; border: 0.5px solid var(--aged-clay); }
  .role { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); }
  .val { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--smoked-oak); }
</style></head>
<body>
<div class="grid">
  <div class="row"><span class="dot" style="background:#F5F1E8"></span><span class="role">bg</span><span class="val">bone-white</span></div>
  <div class="row"><span class="dot" style="background:#2A2520"></span><span class="role">fg</span><span class="val">bark-black</span></div>
  <div class="row"><span class="dot" style="background:#E8DFCE"></span><span class="role">bg-surface</span><span class="val">raw-linen</span></div>
  <div class="row"><span class="dot" style="background:#6B5544"></span><span class="role">fg-muted</span><span class="val">smoked-oak</span></div>
  <div class="row"><span class="dot" style="background:#C9B89A"></span><span class="role">bg-mat / border</span><span class="val">aged-clay</span></div>
  <div class="row"><span class="dot" style="background:#7A2E2A"></span><span class="role">accent</span><span class="val">wax-seal</span></div>
  <div class="row"><span class="dot" style="background:#2A2520"></span><span class="role">bg-inverse</span><span class="val">bark-black</span></div>
  <div class="row"><span class="dot" style="background:#4A5240"></span><span class="role">accent-nature</span><span class="val">forest-moss</span></div>
</div>
</body></html>
