<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 36px; }
  .row { display: grid; grid-template-columns: 90px 1fr; column-gap: 28px; align-items: baseline; padding: 14px 0; border-bottom: 0.5px solid var(--aged-clay); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--smoked-oak); margin-left: 8px; }
  .display { font-family: var(--font-serif); font-weight: 300; font-size: 56px; letter-spacing: -0.02em; line-height: 1; color: var(--bark-black); }
  .h1 { font-family: var(--font-serif); font-weight: 400; font-size: 40px; letter-spacing: -0.02em; line-height: 1; color: var(--bark-black); }
  .h2 { font-family: var(--font-serif); font-style: italic; font-weight: 300; font-size: 26px; line-height: 1.1; color: var(--bark-black); }
  .h3 { font-family: var(--font-sans);  font-weight: 500; font-size: 18px; line-height: 1.2; color: var(--bark-black); }
  .body { font-family: var(--font-sans); font-weight: 400; font-size: 15px; line-height: 1.5; color: var(--bark-black); }
  .cap { font-family: var(--font-mono); font-weight: 400; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
</style></head>
<body>
  <div class="row"><span class="tag">Display</span><div><span class="display">Quiet things</span><span class="meta">serif 96 · 300 · -0.02em</span></div></div>
  <div class="row"><span class="tag">H1</span><div><span class="h1">Quiet things</span><span class="meta">serif 64 · 400</span></div></div>
  <div class="row"><span class="tag">H2 italic</span><div><span class="h2">manifesto, italic</span><span class="meta">serif italic 36 · 300</span></div></div>
  <div class="row"><span class="tag">H3</span><div><span class="h3">Section title</span><span class="meta">sans 20 · 500</span></div></div>
  <div class="row"><span class="tag">Body</span><div><span class="body">Body copy at seventeen pixels.</span><span class="meta">sans 17 · 400 · lh 1.7</span></div></div>
  <div class="row"><span class="tag">Caption</span><div><span class="cap">caption · mono · uppercase</span><span class="meta">mono 11 · 400 · 0.15em</span></div></div>
</body></html>
