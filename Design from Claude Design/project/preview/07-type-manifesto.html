<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 56px 24px; display: flex; align-items: center; justify-content: center; }
  .m { font-family: var(--font-serif); font-style: italic; font-weight: 300; font-size: 34px; line-height: 1.3; text-align: center; color: var(--bark-black); max-width: 22ch; }
  .m em { font-style: italic; color: var(--wax-seal); }
  .rule { display: block; width: 24px; height: 0.5px; background: var(--aged-clay); margin: 22px auto; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--smoked-oak); text-align: center; }
</style></head>
<body>
<div>
  <div class="tag">manifesto</div>
  <span class="rule"></span>
  <div class="m">Object, memory, <em>silence</em> — and then it becomes art.</div>
</div>
</body></html>
