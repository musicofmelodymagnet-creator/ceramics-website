<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 36px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .seal {
    width: 56px; height: 56px; border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #92403D 0%, #7A2E2A 40%, #5E2320 100%);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    color: rgba(245,241,232,0.9); font-family: var(--font-serif); font-style: italic; font-size: 22px;
    box-shadow: inset 0 -6px 12px rgba(0,0,0,0.25), inset 0 4px 8px rgba(255,255,255,0.1);
  }
  .seal::before {
    content: ""; position: absolute; inset: -3px;
    border: 0.5px dashed rgba(122,46,42,0.5); border-radius: 50%;
  }
  .small { width: 16px; height: 16px; background: var(--wax-seal); border-radius: 50%; box-shadow: none; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); text-align: center; }
</style></head>
<body>
<div class="col">
  <div class="seal">O</div>
  <div class="lbl">Wax Seal · certificate stamp</div>
</div>
<div class="col">
  <div class="small"></div>
  <div class="lbl">Favorite marker · 16px</div>
</div>
<div class="col">
  <div style="width:32px;height:32px;background:var(--wax-seal);border-radius:50%"></div>
  <div class="lbl">Return-to-top · 32px</div>
</div>
</body></html>
