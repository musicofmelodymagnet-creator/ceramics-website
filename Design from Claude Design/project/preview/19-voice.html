<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 30px 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
  .col h4 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin: 0 0 16px; font-weight: 400; }
  .yes h4 { color: var(--forest-moss); }
  .no  h4 { color: var(--wax-seal); }
  .q { font-family: var(--font-serif); font-style: italic; font-weight: 300; font-size: 17px; line-height: 1.45; color: var(--bark-black); margin: 0 0 14px; }
  .b { font-family: var(--font-sans); font-size: 14px; line-height: 1.55; color: var(--bark-black); margin: 0; }
  .no .q, .no .b { color: var(--smoked-oak); text-decoration: line-through; text-decoration-color: rgba(122,46,42,0.4); text-decoration-thickness: 0.5px; }
</style></head>
<body>
<div class="col yes">
  <h4>Yes — bring it home</h4>
  <p class="q">"A branch from a tree that watched five centuries pass."</p>
  <p class="b">Bring it home. Hang it where the morning light arrives.</p>
</div>
<div class="col no">
  <h4>Never — corporate</h4>
  <p class="q">"Discover our stunning handcrafted ceramic collection!"</p>
  <p class="b">Get yours today before they're gone! Limited time only.</p>
</div>
</body></html>
