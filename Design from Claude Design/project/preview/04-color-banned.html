<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 36px; }
  h3 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 0.5px solid var(--aged-clay); }
  .sw { aspect-ratio: 3/2; position: relative; border-right: 0.5px solid var(--aged-clay); }
  .sw:last-child { border: 0; }
  .label { position: absolute; bottom: 8px; left: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark-black); background: var(--bone-white); padding: 2px 4px; }
  .strike { position:absolute; inset: 0; }
  .strike::before, .strike::after { content:""; position: absolute; left: -5%; right: -5%; top: 50%; height: 0.5px; background: var(--bark-black); transform: rotate(-12deg); transform-origin: center; }
</style></head>
<body>
<h3>Never — banned color treatments</h3>
<div class="grid">
  <div class="sw" style="background: linear-gradient(135deg,#7A2E2A,#D4A574);"><div class="strike"></div><div class="label">No gradients</div></div>
  <div class="sw" style="background:#FFFFFF;"><div class="strike"></div><div class="label">No pure white</div></div>
  <div class="sw" style="background:#000000;"><div class="strike"></div><div class="label" style="color:#F5F1E8;background:#2A2520">No pure black</div></div>
  <div class="sw" style="background:#FF6A00;"><div class="strike"></div><div class="label" style="color:#F5F1E8;background:#2A2520">No neon</div></div>
</div>
</body></html>
