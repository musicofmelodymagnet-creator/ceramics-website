<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 32px 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  .col h4 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin: 0 0 16px; font-weight: 400; }
  .surface { background: var(--raw-linen); border: 0.5px solid var(--aged-clay); padding: 22px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark-black); }
  .strike { position: relative; }
  .strike::before, .strike::after { content:""; position: absolute; left:-4%; right:-4%; top:50%; height: 0.5px; background: var(--wax-seal); transform: rotate(-8deg); }
  .shadow-demo { background: var(--raw-linen); padding: 22px; box-shadow: 0 12px 32px rgba(0,0,0,0.25); border-radius: 12px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark-black); }
  .note { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--smoked-oak); margin-top: 10px; }
</style></head>
<body>
<div class="col">
  <h4>radius · 0</h4>
  <div class="surface">Sharp corners, museum geometry</div>
  <div class="note">border-radius: 0  ·  everywhere, always</div>
</div>
<div class="col">
  <h4>shadow · none</h4>
  <div class="strike"><div class="shadow-demo">No box-shadow ever</div></div>
  <div class="note">depth = air + surface contrast</div>
</div>
</body></html>
