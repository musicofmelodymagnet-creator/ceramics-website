<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 0.5px solid var(--aged-clay); }
  .sw { aspect-ratio: 5/4; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; border-right: 0.5px solid rgba(0,0,0,0.06); }
  .sw:last-child { border-right: 0; }
  .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; opacity: 0.75; }
  .a { background: #6B5544; color: #F5F1E8; }
  .b { background: #7A2E2A; color: #F5F1E8; }
  .c { background: #4A5240; color: #F5F1E8; }
  .d { background: #D4A574; color: #2A2520; }
</style></head>
<body>
<div class="row">
  <div class="sw a"><div class="name">Smoked Oak</div><div class="hex">#6B5544</div></div>
  <div class="sw b"><div class="name">Wax Seal</div><div class="hex">#7A2E2A</div></div>
  <div class="sw c"><div class="name">Forest Moss</div><div class="hex">#4A5240</div></div>
  <div class="sw d"><div class="name">Honey Light</div><div class="hex">#D4A574</div></div>
</div>
</body></html>
