<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Order Confirmed — ORLINSKY Ceramic Studio</title>
<link rel="canonical" href="https://orlinskyceramic.ca/order-success.html">
<style>
@font-face{font-family:'Cormorant Garamond';src:url('Design%20from%20Claude%20Design/project/fonts/CormorantGaramond-Light.ttf')format('truetype');font-weight:300;font-style:normal;font-display:swap;}
@font-face{font-family:'Inter';src:url('Design%20from%20Claude%20Design/project/fonts/Inter_18pt-Regular.ttf')format('truetype');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('Design%20from%20Claude%20Design/project/fonts/JetBrainsMono-Regular.ttf')format('truetype');font-weight:400;font-style:normal;font-display:swap;}

:root{
  --color-bg-base:#221E1A;
  --color-bg-header:#16130F;
  --color-bg-elevated:#2C2724;
  --color-text-primary:#F5F1E8;
  --color-text-secondary:#C9B89A;
  --color-text-muted:#7A6E63;
  --color-accent:#C8701F;
  --color-border:#2E2820;
  --font-serif:'Cormorant Garamond','EB Garamond',Georgia,serif;
  --font-sans:'Inter',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','IBM Plex Mono',monospace;
}

html,body{margin:0;padding:0;background:var(--color-bg-base);color:var(--color-text-primary);font-family:var(--font-sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}

.os-wrap{max-width:560px;margin:0 auto;padding:80px 24px 120px;}

.os-eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.44em;text-transform:uppercase;color:var(--color-accent);margin:0 0 16px;display:block;}
.os-title{font-family:var(--font-serif);font-weight:300;font-size:clamp(28px,3vw,44px);line-height:1.15;color:var(--color-text-primary);margin:0 0 48px;}

.os-icon{width:56px;height:56px;margin-bottom:36px;display:block;}
.os-icon circle{stroke:var(--color-accent);fill:none;stroke-width:1.5;}
.os-icon path{stroke:var(--color-accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

.os-card{background:var(--color-bg-elevated);border:1px solid var(--color-border);padding:28px 28px 24px;}

.os-card-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--color-text-muted);display:block;margin-bottom:18px;}

.os-body{font-size:14px;color:var(--color-text-secondary);line-height:1.65;margin:0 0 20px;}
.os-body:last-of-type{margin-bottom:0;}

.os-divider{border:none;border-top:1px solid var(--color-border);margin:24px 0;}

.os-order-row{display:flex;align-items:baseline;gap:12px;}
.os-order-key{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--color-text-muted);white-space:nowrap;}
.os-order-val{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);word-break:break-all;}

.os-home-btn{display:block;width:100%;background:transparent;border:1px solid var(--color-accent);padding:15px 40px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--color-accent);text-align:center;text-decoration:none;margin-top:36px;transition:background 200ms ease,color 200ms ease;box-sizing:border-box;}
.os-home-btn:hover{background:var(--color-accent);color:var(--color-text-primary);}
</style>
</head>
<body>

<div class="os-wrap">

  <svg class="os-icon" id="os-icon" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
    <circle cx="28" cy="28" r="22"/>
    <path d="M19 28.5l6.5 6.5 11.5-13"/>
  </svg>

  <span class="os-eyebrow" id="os-eyebrow">Order Confirmed</span>
  <h1 class="os-title" id="os-title">Thank you<br>for your order</h1>

  <div class="os-card">
    <span class="os-card-label" id="os-card-label">What happens next</span>

    <p class="os-body" id="os-body-1">Your payment has been received. We will contact you shortly with shipping details and tracking information.</p>
    <p class="os-body" id="os-body-2">A receipt has been sent to your email address.</p>

    <hr class="os-divider">

    <div class="os-order-row">
      <span class="os-order-key">Order</span>
      <span class="os-order-val" id="os-order-id">—</span>
    </div>
  </div>

  <a href="/" class="os-home-btn">Return to Home</a>

</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var pi = params.get('payment_intent') || params.get('paymentIntent');
  if (pi) {
    document.getElementById('os-order-id').textContent = pi;
  }

  // Stripe appends redirect_status to the return URL.
  // Only 'succeeded' means the payment actually went through.
  var status  = params.get('redirect_status');
  var icon    = document.getElementById('os-icon');
  var eyebrow = document.getElementById('os-eyebrow');
  var title   = document.getElementById('os-title');
  var label   = document.getElementById('os-card-label');
  var body1   = document.getElementById('os-body-1');
  var body2   = document.getElementById('os-body-2');

  if (status === 'succeeded') {
    // Keep the default "Order Confirmed / payment received" content.
  } else if (status === 'processing') {
    document.title = 'Payment Processing — ORLINSKY Ceramic Studio';
    if (icon) icon.style.display = 'none';
    eyebrow.textContent = 'Payment Processing';
    title.innerHTML = 'Your payment<br>is processing';
    label.textContent = 'What happens next';
    body1.textContent = 'Payment processing, we\'ll confirm by email as soon as it completes.';
    body2.textContent = 'No further action is needed from you right now.';
  } else {
    document.title = 'Payment Not Completed — ORLINSKY Ceramic Studio';
    if (icon) icon.style.display = 'none';
    eyebrow.textContent = 'Payment Not Completed';
    title.innerHTML = 'Payment was<br>not completed';
    label.textContent = 'What you can do';
    body1.textContent = 'Your payment was not completed, so no order has been placed and nothing has been charged.';
    body2.innerHTML = 'Please <a href="/" style="color:var(--color-accent)">return to the site</a> and try again, or contact us at <a href="mailto:info@orlinskyceramic.ca" style="color:var(--color-accent)">info@orlinskyceramic.ca</a> and we will help.';
  }
})();
</script>

<script src="chat-widget.js" defer></script>
</body>
</html>
