<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { background: var(--raw-linen); border: 0.5px solid var(--aged-clay); padding: 22px; }
  .mat  { background: var(--aged-clay); padding: 22px; }
  .ph { aspect-ratio: 4/3; background:
    repeating-linear-gradient(45deg, rgba(42,37,32,0.04) 0 1px, transparent 1px 8px),
    var(--bone-white); border: 0.5px solid rgba(42,37,32,0.1); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin-bottom: 14px; }
  .ph2 { aspect-ratio: 4/3; background: var(--raw-linen); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin-bottom: 14px; }
  .name { font-family: var(--font-serif); font-size: 22px; color: var(--bark-black); margin-bottom: 6px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin-bottom: 12px; }
</style></head>
<body>
<div>
  <div class="tag">card · raw-linen surface</div>
  <div class="card">
    <div class="ph">work №014</div>
    <div class="name">A morning in May</div>
    <div class="cap">2025 · pressed oak · 1 / 1</div>
  </div>
</div>
<div>
  <div class="tag">image mat · aged-clay surface</div>
  <div class="mat">
    <div class="ph2">work №022</div>
    <div class="name" style="color:var(--bark-black)">The orchard at six</div>
    <div class="cap">2025 · linen glaze · 1 / 1</div>
  </div>
</div>
</body></html>
