<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 0.5px solid var(--aged-clay); }
  .sw { aspect-ratio: 5/4; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; border-right: 0.5px solid rgba(0,0,0,0.06); }
  .sw:last-child { border-right: 0; }
  .sw .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; opacity: 0.7; }
  .a { background: #F5F1E8; color: #2A2520; }
  .b { background: #E8DFCE; color: #2A2520; }
  .c { background: #C9B89A; color: #2A2520; }
  .d { background: #2A2520; color: #F5F1E8; }
</style></head>
<body>
<div class="row">
  <div class="sw a"><div class="name">Bone White</div><div class="hex">#F5F1E8</div></div>
  <div class="sw b"><div class="name">Raw Linen</div><div class="hex">#E8DFCE</div></div>
  <div class="sw c"><div class="name">Aged Clay</div><div class="hex">#C9B89A</div></div>
  <div class="sw d"><div class="name">Bark Black</div><div class="hex">#2A2520</div></div>
</div>
</body></html>
