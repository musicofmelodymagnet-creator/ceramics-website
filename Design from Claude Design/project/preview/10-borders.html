<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 36px 40px; display: grid; gap: 28px; }
  .demo { display: grid; grid-template-columns: 120px 1fr; gap: 24px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); }
  .box { border: 0.5px solid var(--aged-clay); padding: 18px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--bark-black); }
  hr { border: 0; border-top: 0.5px solid var(--aged-clay); margin: 0; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); padding: 14px 0; }
</style></head>
<body>
<div class="demo"><span class="tag">border</span><div class="box">0.5px solid aged-clay #C9B89A</div></div>
<div class="demo"><span class="tag">divider</span><div><div class="lbl">Section above</div><hr><div class="lbl">Section below</div></div></div>
</body></html>
