<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 32px 40px; }
  .cap { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); line-height: 1.4; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; }
  .chip { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bark-black); border: 0.5px solid var(--aged-clay); padding: 8px 14px; }
  .hl { color: var(--bark-black); }
  h4 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin: 0 0 12px; font-weight: 400; }
  .stack { display: grid; gap: 22px; }
  .ex { display: grid; grid-template-columns: 100px 1fr; gap: 24px; align-items: center; }
</style></head>
<body>
<h4>Caption — how it speaks</h4>
<div class="stack">
  <div class="ex">
    <div class="cap hl">Plate № 014</div>
    <div class="cap">2025 · pressed oak · matte glaze</div>
  </div>
  <div class="ex">
    <div class="cap hl">Edition</div>
    <div class="cap">1 of 1 · signed verso</div>
  </div>
</div>
<div class="row" style="margin-top:24px">
  <span class="chip">In stock</span><span class="chip">Wax-sealed</span><span class="chip">Brooklyn studio</span>
</div>
</body></html>
