<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bone-white); padding: 28px 36px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--smoked-oak); margin-bottom: 14px; }
  .stage { height: 100px; border: 0.5px solid var(--aged-clay); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .fader { font-family: var(--font-serif); font-style: italic; font-weight: 300; font-size: 26px; color: var(--bark-black); animation: f 4s ease-in-out infinite; }
  @keyframes f { 0%, 30% { opacity: 0 } 50%, 80% { opacity: 1 } 100% { opacity: 0 } }
  .strike { position: relative; }
  .strike::before, .strike::after { content:""; position: absolute; left:-4%; right:-4%; top:50%; height: 0.5px; background: var(--wax-seal); transform: rotate(-8deg); }
  .nope { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark-black); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--smoked-oak); margin-top: 10px; }
</style></head>
<body>
<div class="row">
  <div>
    <div class="tag">fade-in · 800ms</div>
    <div class="stage"><div class="fader">things appear</div></div>
    <div class="meta">cubic-bezier(0.4, 0, 0.2, 1)</div>
  </div>
  <div>
    <div class="tag">never</div>
    <div class="stage"><div class="strike"><div class="nope">bounce · slide · scale · parallax</div></div></div>
    <div class="meta">things do not arrive — they appear</div>
  </div>
</div>
</body></html>
