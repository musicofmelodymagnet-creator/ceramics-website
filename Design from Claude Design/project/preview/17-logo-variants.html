<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bark-black); color: var(--bone-white); }

  .hero {
    padding: 56px 24px 48px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-bottom: 0.5px solid rgba(201,184,154,0.18);
  }
  .hero .eagle { height: 96px; width: auto; display: block; }
  .hero .orl {
    font-family: var(--font-serif);
    font-weight: 500;            /* heavier — Cormorant Medium */
    font-size: 44px;
    letter-spacing: 0.38em;
    text-indent: 0.38em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--bone-white);
    margin-top: 18px;
  }
  .hero .sub {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.36em;
    text-indent: 0.36em;
    text-transform: uppercase;
    color: #6B5544; /* smoked oak */
    margin-top: 14px;
  }

  .spec-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 0.5px solid rgba(201,184,154,0.18);
  }
  .spec {
    padding: 28px 16px 24px;
    text-align: center;
    border-right: 0.5px solid rgba(201,184,154,0.18);
    position: relative;
  }
  .spec:last-child { border-right: 0; }

  .spec .badge {
    position: absolute; top: 12px; left: 14px;
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(245,241,232,0.4);
  }
  .spec .badge b { color: var(--bone-white); font-weight: 400; }
  .spec.chosen .badge b { color: #D4A574; }

  .spec .mini-eagle { height: 28px; }
  .spec .mini-orl {
    font-family: var(--font-serif);
    text-transform: uppercase;
    font-size: 16px;
    letter-spacing: 0.34em;
    text-indent: 0.34em;
    line-height: 1;
    color: var(--bone-white);
    margin-top: 10px;
  }
  .spec .w-300 { font-weight: 300; }
  .spec .w-400 { font-weight: 400; }
  .spec .w-500 { font-weight: 500; }

  .spec .label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,241,232,0.45);
    margin-top: 14px;
  }

  .footer {
    padding: 18px 24px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245,241,232,0.42);
    display: flex; justify-content: space-between;
  }
</style></head>
<body>

<div class="hero">
  <img class="eagle" src="../assets/eagle-honey.png" alt="">
  <div class="orl">ORLINSKY</div>
  <div class="sub">CERAMIC&nbsp;&nbsp;STUDIO</div>
</div>

<div class="spec-row">
  <div class="spec">
    <span class="badge"><b>300</b>  ·  light</span>
    <img class="mini-eagle" src="../assets/eagle-honey.png" alt="">
    <div class="mini-orl w-300">ORLINSKY</div>
    <div class="label">too thin</div>
  </div>
  <div class="spec">
    <span class="badge"><b>400</b>  ·  regular</span>
    <img class="mini-eagle" src="../assets/eagle-honey.png" alt="">
    <div class="mini-orl w-400">ORLINSKY</div>
    <div class="label">previous</div>
  </div>
  <div class="spec chosen">
    <span class="badge"><b>500</b>  ·  medium</span>
    <img class="mini-eagle" src="../assets/eagle-honey.png" alt="">
    <div class="mini-orl w-500">ORLINSKY</div>
    <div class="label">chosen — brand max</div>
  </div>
</div>

<div class="footer">
  <span>variant A2 · final</span>
  <span>eagle honey light · sub smoked oak · name bone medium</span>
</div>

</body></html>
